name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Tests
      run: npm run test

    # --publish never: package.json carries a GitHub publish config and
    # electron-builder defaults to onTagOrDraft in CI — an unsigned CI build
    # must never be released automatically.
    - name: Build Windows Executable
      run: npm run build:win -- --publish never

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KingNationLauncher-Windows
        path: dist/*.exe
